<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قارئ PDF عربي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

  <!-- شاشة الرفع -->
  <div id="screen-upload">
    <h1>قارئ PDF عربي</h1>
    <p>ارفع ملف PDF وسيُقرأ بصوت عالٍ من اليمين إلى اليسار</p>
    <div id="drop-zone">
      <input type="file" id="file-input" accept=".pdf" hidden />
      <p>اسحب الملف هنا</p>
      <button id="btn-choose">اختر ملف PDF</button>
    </div>
  </div>

  <!-- شاشة القراءة -->
  <div id="screen-reader" class="hidden">

    <div id="topbar">
      <button id="btn-back">← ملف جديد</button>
      <span id="file-name"></span>
      <div id="nav">
        <button id="btn-prev">›</button>
        <span id="page-info">1 / 1</span>
        <button id="btn-next">‹</button>
      </div>
      <div id="zoom-controls">
        <button id="btn-zoom-out">−</button>
        <span id="zoom-label">150%</span>
        <button id="btn-zoom-in">+</button>
      </div>
      <button id="btn-mode" title="تبديل بين PDF والنص">📄 عرض النص</button>
    </div>

    <div id="tts-bar">
      <button id="btn-play">▶ ابدأ القراءة</button>
      <button id="btn-stop">■ إيقاف</button>
      <label>السرعة
        <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1" />
        <span id="speed-val">1.0×</span>
      </label>
      <label>الصوت
        <select id="voice-select"></select>
      </label>
    </div>

    <!-- وضع PDF -->
    <div id="pdf-view">
      <div id="canvas-wrap">
        <canvas id="pdf-canvas"></canvas>
        <canvas id="hl-canvas"></canvas>
      </div>
    </div>

    <!-- وضع النص -->
    <div id="text-view" class="hidden" dir="rtl"></div>

    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
