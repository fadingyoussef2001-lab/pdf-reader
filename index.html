<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>قارئ PDF عربي</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<!-- ═══════════════════════════════ شاشة الرفع ═══════════════════════════════ -->
<div id="page-upload">
  <div class="upload-box">
    <div class="upload-logo">ق</div>
    <h1>قارئ PDF عربي</h1>
    <p class="upload-sub">ارفع ملفك واقرأ بصوت أو بعيون مرتاحة</p>
    <label id="drop-zone">
      <input type="file" id="file-input" accept=".pdf"/>
      <span class="drop-icon">⬆</span>
      <span class="drop-text">اسحب ملف PDF هنا أو انقر للاختيار</span>
    </label>
    <div id="upload-error" class="hidden">⚠ يرجى اختيار ملف PDF صالح</div>
  </div>
</div>

<!-- ═══════════════════════════════ شاشة القراءة ═══════════════════════════════ -->
<div id="page-reader" class="hidden">

  <!-- شريط أعلى -->
  <header id="header">
    <button id="btn-new" title="ملف جديد">↩ ملف جديد</button>
    <span id="lbl-file"></span>
    <div id="page-nav">
      <button id="btn-prev" disabled>›</button>
      <span id="lbl-page">1 / 1</span>
      <button id="btn-next" disabled>‹</button>
    </div>
  </header>

  <!-- شريط القراءة الصوتية -->
  <div id="tts-bar">
    <button id="btn-play" class="btn-main">▶&nbsp; ابدأ القراءة</button>
    <button id="btn-stop" class="btn-sec">■&nbsp; إيقاف</button>

    <div class="ctrl-group">
      <span class="ctrl-lbl">السرعة</span>
      <input type="range" id="rng-speed" min="0.5" max="2.5" step="0.1" value="1"/>
      <span id="lbl-speed">1.0×</span>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-lbl">الصوت</span>
      <select id="sel-voice"></select>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-lbl">حجم الخط</span>
      <button id="btn-fs-down">A−</button>
      <button id="btn-fs-up">A+</button>
    </div>
  </div>

  <!-- منطقة النص -->
  <main id="text-area">
    <div id="text-content" dir="rtl"></div>
  </main>

  <!-- شريط التقدم -->
  <div id="prog-bar"><div id="prog-fill"></div></div>

</div>

<script src="app.js"></script>
</body>
</html>
